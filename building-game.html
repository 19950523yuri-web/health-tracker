<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>楼王免单</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #ff6b6b 0%, #ee5a24 100%);
            height: 100%;
            overflow: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 活动标题区 */
        .header-section {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            padding: 16px;
            text-align: center;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .header-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
        }

        .main-title {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .main-title::before {
            content: '👑';
            margin-right: 8px;
        }

        .main-title::after {
            content: '👑';
            margin-left: 8px;
        }

        .sub-title {
            font-size: 14px;
            color: rgba(255,255,255,0.95);
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        .sub-title strong {
            color: #fff700;
            font-size: 16px;
        }

        /* 商品卡片 */
        .prize-card {
            background: #fff;
            margin: 0 12px 12px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        .prize-header {
            background: linear-gradient(90deg, #ff6b6b 0%, #ee5a24 100%);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prize-tag {
            font-size: 13px;
            color: #fff;
            font-weight: 600;
        }

        .prize-tag::before {
            content: '🎁';
            margin-right: 4px;
        }

        .prize-rule {
            font-size: 12px;
            color: rgba(255,255,255,0.9);
        }

        .prize-body {
            padding: 16px;
            display: flex;
            gap: 14px;
        }

        .prize-image {
            width: 100px;
            height: 100px;
            border-radius: 12px;
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .prize-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .shop-name {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }

        .shop-name::before {
            content: '🏪';
            margin-right: 4px;
        }

        .product-name {
            font-size: 17px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .price-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .original-price {
            font-size: 14px;
            color: #999;
            text-decoration: line-through;
        }

        .free-badge {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(238, 90, 36, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .delivery-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-top: 10px;
            border-top: 1px dashed #eee;
            font-size: 12px;
            color: #666;
        }

        .delivery-info span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .delivery-info .no-store {
            color: #999;
        }

        /* 主游戏区域 */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
            margin: 0 12px 12px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            min-height: 0;
        }

        /* 状态栏 */
        .status-bar {
            background: linear-gradient(90deg, #ff6b6b 0%, #ee5a24 100%);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-shrink: 0;
        }

        .status-item {
            text-align: center;
            flex: 1;
        }

        .status-label {
            font-size: 11px;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .status-value {
            font-size: 20px;
            font-weight: 800;
        }

        .status-divider {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.3);
        }

        .next-lucky {
            color: #fff700;
            text-shadow: 0 0 10px rgba(255, 247, 0, 0.5);
        }

        /* 楼层建筑 */
        .building {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            background: #f8f9fa;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
        }

        .building::-webkit-scrollbar {
            width: 4px;
        }

        .building::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }

        .floor {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            border-radius: 12px;
            background: white;
            border: 2px solid #e8e8e8;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
            flex-shrink: 0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .floor.normal {
            border-color: #e8e8e8;
        }

        .floor.lucky {
            background: linear-gradient(135deg, #fff9e6 0%, #ffe082 100%);
            border-color: #ffc107;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
            transform: scale(1.02);
        }

        .floor-number-badge {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .floor.normal .floor-number-badge {
            background: #f0f0f0;
            color: #666;
        }

        .floor.lucky .floor-number-badge {
            background: linear-gradient(135deg, #ffd700 0%, #ff8f00 100%);
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            box-shadow: 0 2px 8px rgba(255, 193, 7, 0.5);
        }

        .floor-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .floor-avatars {
            display: flex;
            align-items: center;
        }

        .user-avatar, .brand-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .user-avatar {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            margin-right: -10px;
            z-index: 1;
        }

        .brand-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .floor-info {
            margin-left: 8px;
        }

        .floor-owner {
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }

        .floor-reward {
            font-size: 12px;
            color: #999;
        }

        .floor.lucky .floor-reward {
            color: #e65100;
            font-weight: 700;
        }

        .lucky-badge {
            background: linear-gradient(135deg, #ffd700 0%, #ff8f00 100%);
            color: white;
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 800;
            margin-left: auto;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 2px 8px rgba(255, 193, 7, 0.4);
            animation: shine 2s infinite;
        }

        @keyframes shine {
            0%, 100% { box-shadow: 0 2px 8px rgba(255, 193, 7, 0.4); }
            50% { box-shadow: 0 4px 16px rgba(255, 193, 7, 0.7); }
        }

        /* 底部操作区 */
        .action-area {
            background: white;
            padding: 12px;
            border-top: 1px solid #f0f0f0;
            flex-shrink: 0;
        }

        .user-selector {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .user-selector::-webkit-scrollbar {
            display: none;
        }

        .user-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 12px;
            border-radius: 10px;
            border: 2px solid #e8e8e8;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 60px;
            flex-shrink: 0;
            background: white;
        }

        .user-option:hover {
            border-color: #ff6b6b;
        }

        .user-option.selected {
            border-color: #ff6b6b;
            background: #fff5f5;
        }

        .user-option-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .user-option-name {
            font-size: 11px;
            color: #666;
        }

        .build-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(238, 90, 36, 0.4);
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .build-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(238, 90, 36, 0.5);
        }

        .build-btn:active {
            transform: translateY(0);
        }

        /* 免单弹窗 */
        .reward-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .reward-modal.show {
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .reward-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        @keyframes scaleIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .reward-icon {
            font-size: 70px;
            margin-bottom: 16px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .reward-title {
            font-size: 26px;
            font-weight: 800;
            color: #333;
            margin-bottom: 8px;
        }

        .reward-floor {
            font-size: 18px;
            color: #ee5a24;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .reward-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .reward-avatars {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .reward-avatar-item {
            text-align: center;
        }

        .reward-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .reward-avatar.user {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
        }

        .reward-avatar.brand {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .reward-avatar-label {
            font-size: 12px;
            color: #999;
        }

        .reward-close-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8f00 100%);
            color: white;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.4);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .empty-state-text {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 活动标题区 -->
        <div class="header-section">
            <div class="main-title">楼王免单</div>
            <div class="sub-title">抢到中奖楼层，<strong>100%得免单</strong></div>
        </div>

        <!-- 本期免单奖品卡片 -->
        <div class="prize-card">
            <div class="prize-header">
                <div class="prize-tag">本期免单奖品</div>
                <div class="prize-rule">抢到中奖楼层用户直接获得</div>
            </div>
            <div class="prize-body">
                <div class="prize-image">🍜</div>
                <div class="prize-info">
                    <div>
                        <div class="shop-name">老王牛肉面</div>
                        <div class="product-name">招牌红烧牛肉面</div>
                    </div>
                    <div class="price-section">
                        <span class="original-price">¥38</span>
                        <span class="free-badge">免单</span>
                    </div>
                    <div class="delivery-info">
                        <span>🛵 免配送费</span>
                        <span>⏱️ 30分钟</span>
                        <span>📍 1.2km</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主游戏区域 -->
        <div class="game-area">
            <!-- 状态栏 -->
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-label">下一中奖楼层</div>
                    <div class="status-value next-lucky" id="nextLuckyFloor">8</div>
                </div>
                <div class="status-divider"></div>
                <div class="status-item">
                    <div class="status-label">已中奖楼层</div>
                    <div class="status-value" id="luckyFloorsCount">0</div>
                </div>
                <div class="status-divider"></div>
                <div class="status-item">
                    <div class="status-label">幸运儿</div>
                    <div class="status-value" id="luckyUsersCount">0</div>
                </div>
            </div>

            <!-- 楼层建筑 -->
            <div class="building" id="building">
                <div class="empty-state">
                    <div class="empty-state-icon">🏗️</div>
                    <div class="empty-state-text">还没有楼层，快来盖第一层楼吧！</div>
                </div>
            </div>

            <!-- 底部操作区 -->
            <div class="action-area">
                <div class="user-selector" id="userSelector"></div>
                <button class="build-btn" onclick="buildFloor()">
                    🏗️ 下单盖楼
                </button>
            </div>
        </div>
    </div>

    <!-- 免单奖励弹窗 -->
    <div class="reward-modal" id="rewardModal">
        <div class="reward-content">
            <div class="reward-icon">🎉</div>
            <div class="reward-title">恭喜你获得免单！</div>
            <div class="reward-floor" id="rewardFloor">第8层</div>
            <div class="reward-desc">
                你的头像和商家品牌头像将永久展示在这座楼上！
            </div>
            <div class="reward-avatars">
                <div class="reward-avatar-item">
                    <div class="reward-avatar user" id="rewardUserAvatar">👤</div>
                    <div class="reward-avatar-label">你的头像</div>
                </div>
                <div class="reward-avatar-item">
                    <div class="reward-avatar brand">🍜</div>
                    <div class="reward-avatar-label">品牌头像</div>
                </div>
            </div>
            <button class="reward-close-btn" onclick="closeReward()">太棒了！</button>
        </div>
    </div>

    <script>
        // 模拟用户数据
        const mockUsers = [
            { id: 1, name: '小明', avatar: '😎', color: '#ff6b6b' },
            { id: 2, name: '小红', avatar: '🥰', color: '#f5576c' },
            { id: 3, name: '阿强', avatar: '🤠', color: '#4CAF50' },
            { id: 4, name: '丽丽', avatar: '🌸', color: '#ff6b9d' },
            { id: 5, name: '老王', avatar: '👴', color: '#ff9800' },
        ];

        const merchant = {
            name: '老王牛肉面',
            avatar: '🍜'
        };

        // 门店信息（模拟）
        const storeInfo = {
            hasStore: true,
            deliveryFee: 0,
            deliveryTime: 30,
            distance: 1.2
        };

        let gameData = {
            currentFloor: 1,
            floors: [],
            selectedUserId: 1
        };

        function init() {
            loadData();
            renderUserSelector();
            renderBuilding();
            updateUI();
        }

        function isLuckyFloor(floorNum) {
            return floorNum.toString().includes('8') || floorNum % 8 === 0;
        }

        function getNextLuckyFloor() {
            let floor = gameData.currentFloor;
            while (!isLuckyFloor(floor)) {
                floor++;
            }
            return floor;
        }

        function renderUserSelector() {
            const container = document.getElementById('userSelector');
            container.innerHTML = mockUsers.map(user => `
                <div class="user-option ${user.id === gameData.selectedUserId ? 'selected' : ''}"
                     onclick="selectUser(${user.id})">
                    <div class="user-option-avatar" style="background: ${user.color}20; color: ${user.color}">
                        ${user.avatar}
                    </div>
                    <div class="user-option-name">${user.name}</div>
                </div>
            `).join('');
        }

        function selectUser(userId) {
            gameData.selectedUserId = userId;
            renderUserSelector();
        }

        function getCurrentUser() {
            return mockUsers.find(u => u.id === gameData.selectedUserId);
        }

        function renderBuilding() {
            const container = document.getElementById('building');

            if (gameData.floors.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🏗️</div>
                        <div class="empty-state-text">还没有楼层，快来盖第一层楼吧！</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = [...gameData.floors].reverse().map((floor) => {
                const isLucky = isLuckyFloor(floor.number);
                const user = mockUsers.find(u => u.id === floor.userId);

                return `
                    <div class="floor ${isLucky ? 'lucky' : 'normal'}">
                        <div class="floor-number-badge">${floor.number}</div>
                        <div class="floor-content">
                            <div class="floor-avatars">
                                <div class="user-avatar">${user.avatar}</div>
                                <div class="brand-avatar">${merchant.avatar}</div>
                            </div>
                            <div class="floor-info">
                                <div class="floor-owner">${user.name}</div>
                                <div class="floor-reward">${isLucky ? '🎉 获得免单奖励' : '参与盖楼'}</div>
                            </div>
                        </div>
                        ${isLucky ? '<div class="lucky-badge">🏆 免单</div>' : ''}
                    </div>
                `;
            }).join('');
        }

        function updateUI() {
            const luckyFloors = gameData.floors.filter(f => isLuckyFloor(f.number));
            const luckyUserIds = new Set(luckyFloors.map(f => f.userId));

            document.getElementById('nextLuckyFloor').textContent = getNextLuckyFloor();
            document.getElementById('luckyFloorsCount').textContent = luckyFloors.length;
            document.getElementById('luckyUsersCount').textContent = luckyUserIds.size;
        }

        function scrollToLatest() {
            const building = document.getElementById('building');
            building.scrollTop = 0;
        }

        function buildFloor() {
            const user = getCurrentUser();
            const floorNum = gameData.currentFloor;
            const isLucky = isLuckyFloor(floorNum);

            gameData.floors.push({
                number: floorNum,
                userId: user.id,
                timestamp: Date.now()
            });

            gameData.currentFloor++;

            renderBuilding();
            updateUI();
            saveData();
            scrollToLatest();

            if (isLucky) {
                setTimeout(() => {
                    showReward(floorNum, user);
                }, 300);
            }
        }

        function showReward(floorNum, user) {
            document.getElementById('rewardFloor').textContent = `第${floorNum}层`;
            document.getElementById('rewardUserAvatar').textContent = user.avatar;
            document.getElementById('rewardModal').classList.add('show');
        }

        function closeReward() {
            document.getElementById('rewardModal').classList.remove('show');
        }

        function saveData() {
            localStorage.setItem('buildingGame', JSON.stringify(gameData));
        }

        function loadData() {
            const saved = localStorage.getItem('buildingGame');
            if (saved) {
                gameData = JSON.parse(saved);
            }
        }

        init();
    </script>
</body>
</html>
