<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本周健康外卖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            padding: 15px;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        /* 周导航 */
        .week-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 16px;
            padding: 12px 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .week-days {
            display: flex;
            gap: 6px;
        }

        .week-day-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .week-day-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .week-day-btn:hover:not(.active) {
            background: #e8e8e8;
        }

        /* 外卖区域 */
        .meal-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            border: none;
            background: #f0f4ff;
            color: #667eea;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #e0e8ff;
        }

        .refresh-btn.spinning {
            animation: spin 0.5s ease-out;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 餐段标题 */
        .meal-time {
            margin-bottom: 20px;
        }

        .meal-time:last-child {
            margin-bottom: 0;
        }

        .meal-time-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f0f0f0;
        }

        .meal-time-icon {
            font-size: 22px;
        }

        .meal-time-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }

        /* 商品卡片 */
        .food-cards {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .food-cards::-webkit-scrollbar {
            display: none;
        }

        .product-card {
            min-width: 280px;
            background: white;
            border-radius: 16px;
            border: 1px solid #f0f0f0;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.2s;
        }

        .product-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .product-image {
            width: 100%;
            height: 140px;
            background: linear-gradient(135deg, #f5f7fa, #e4e8ec);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
        }

        .product-sold {
            position: absolute;
            bottom: 8px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
        }

        .product-content {
            padding: 12px;
        }

        .product-shop {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .product-shop::before {
            content: '🏪';
        }

        .product-name {
            font-size: 15px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .product-delivery {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }

        .delivery-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .product-tags {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .product-tag {
            font-size: 11px;
            padding: 3px 8px;
            background: #e8f5e9;
            color: #4CAF50;
            border-radius: 4px;
            font-weight: 600;
        }

        .product-tag.calorie {
            background: #fff3e0;
            color: #f57c00;
        }

        .product-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .price-current {
            font-size: 20px;
            font-weight: 700;
            color: #ff5722;
        }

        .price-current::before {
            content: '¥';
            font-size: 14px;
        }

        .price-original {
            font-size: 13px;
            color: #999;
            text-decoration: line-through;
        }

        .buy-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #ff5722, #f4511e);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .buy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(255, 87, 34, 0.3);
        }

        /* 打卡区域 */
        .track-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .track-card {
            background: white;
            border-radius: 20px;
            padding: 18px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .track-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .track-count {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .track-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .track-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .track-btn.minus {
            background: #f5f5f5;
            color: #666;
        }

        .track-btn.minus:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .track-btn.plus {
            background: #e3f2fd;
            color: #1976d2;
        }

        .track-btn.plus:hover {
            background: #bbdefb;
        }

        .track-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 水桶 */
        .water-bucket {
            position: relative;
            width: 50px;
            height: 60px;
            margin: 0 auto 10px;
            background: linear-gradient(180deg, #e3f2fd, #bbdefb);
            border-radius: 5px 5px 10px 10px;
            border: 2px solid #90caf9;
            overflow: hidden;
        }

        .bucket-water {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, #4fc3f7, #0288d1);
            transition: height 0.3s ease-out;
        }

        .bucket-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: 700;
            color: #01579b;
            z-index: 10;
        }

        /* 分享卡片 */
        .share-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .share-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            padding: 20px;
            color: white;
            margin-bottom: 15px;
        }

        .share-title {
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
        }

        .share-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        .share-stat {
            text-align: center;
        }

        .share-stat-icon {
            font-size: 24px;
        }

        .share-stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .share-stat-label {
            font-size: 11px;
            opacity: 0.9;
        }

        .share-water-bar {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .share-water-fill {
            height: 100%;
            background: #4fc3f7;
            border-radius: 10px;
            transition: width 0.3s;
        }

        .share-water-text {
            text-align: center;
            font-size: 12px;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .checkin-btn {
            background: #4caf50;
            color: white;
        }

        .checkin-btn:hover {
            background: #45a049;
        }

        .checkin-btn:disabled {
            background: #ccc;
        }

        .share-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .share-btn:hover {
            opacity: 0.95;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ffebee;
            color: #c62828;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 动画 */
        .feedback-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            pointer-events: none;
            animation: popupFloat 0.8s ease-out forwards;
            z-index: 1000;
        }

        @keyframes popupFloat {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍱 本周健康外卖</h1>

        <!-- 周导航 -->
        <div class="week-nav">
            <div class="week-days" id="weekDays">

                <button class="week-day-btn" onclick="selectDay(3)">四</button>
                <button class="week-day-btn" onclick="selectDay(4)">五</button>
                <button class="week-day-btn" onclick="selectDay(5)">六</button>
                <button class="week-day-btn" onclick="selectDay(6)">日</button>
            </div>
        </div>

        <!-- 今日外卖推荐 -->
        <div class="meal-section">
            <div class="section-header">
                <div class="section-title" id="dayTitle">周一外卖</div>
                <button class="refresh-btn" onclick="refreshMeals()">
                    <span>🔄</span> 换一换
                </button>
            </div>

            <!-- 早餐建议 -->
            <div class="meal-time">
                <div class="meal-time-header">
                    <span class="meal-time-icon">🌅</span>
                    <span class="meal-time-title">早餐建议</span>
                </div>
                <div class="food-cards" id="breakfastCards">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 午餐建议 -->
            <div class="meal-time">
                <div class="meal-time-header">
                    <span class="meal-time-icon">☀️</span>
                    <span class="meal-time-title">午餐建议</span>
                </div>
                <div class="food-cards" id="lunchCards">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 晚餐建议 -->
            <div class="meal-time">
                <div class="meal-time-header">
                    <span class="meal-time-icon">🌙</span>
                    <span class="meal-time-title">晚餐建议</span>
                </div>
                <div class="food-cards" id="dinnerCards">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 打卡区域 -->
        <div class="track-section">
            <div class="track-card">
                <div class="track-icon">🧋</div>
                <div class="track-count" id="milkteaCount">0</div>
                <div class="track-controls">
                    <button class="track-btn minus" onclick="changeCount('milktea', -1)" id="milkteaMinus" disabled>−</button>
                    <button class="track-btn plus" onclick="changeCount('milktea', 1)">+</button>
                </div>
            </div>
            <div class="track-card">
                <div class="track-icon">💩</div>
                <div class="track-count" id="pupuCount">0</div>
                <div class="track-controls">
                    <button class="track-btn minus" onclick="changeCount('pupu', -1)" id="pupuMinus" disabled>−</button>
                    <button class="track-btn plus" onclick="changeCount('pupu', 1)">+</button>
                </div>
            </div>
            <div class="track-card">
                <div class="water-bucket">
                    <div class="bucket-water" id="bucketWater" style="height: 0%"></div>
                    <div class="bucket-label" id="bucketLabel">0%</div>
                </div>
                <div class="track-count" id="waterCount">0</div>
                <div class="track-controls">
                    <button class="track-btn minus" onclick="changeWater(-150)" id="waterMinus" disabled>−</button>
                    <button class="track-btn plus" onclick="changeWater(150)">+</button>
                </div>
            </div>
        </div>

        <!-- 分享卡片 -->
        <div class="share-section">
            <div class="share-card">
                <div class="share-title">📸 今日打卡</div>
                <div class="share-stats">
                    <div class="share-stat">
                        <div class="share-stat-icon">💩</div>
                        <div class="share-stat-value" id="sharePupu">0</div>
                        <div class="share-stat-label">噗噗</div>
                    </div>
                    <div class="share-stat">
                        <div class="share-stat-icon">🧋</div>
                        <div class="share-stat-value" id="shareMilktea">0</div>
                        <div class="share-stat-label">奶茶</div>
                    </div>
                    <div class="share-stat">
                        <div class="share-stat-icon">💧</div>
                        <div class="share-stat-value" id="shareWater">0</div>
                        <div class="share-stat-label">喝水ml</div>
                    </div>
                </div>
                <div class="share-water-bar">
                    <div class="share-water-fill" id="shareWaterFill" style="width: 0%"></div>
                </div>
                <div class="share-water-text">喝水进度 <span id="shareWaterText">0/1500ml</span></div>
            </div>
            <button class="action-btn checkin-btn" id="checkinBtn" onclick="doCheckIn()">✅ 今日打卡</button>
            <button class="action-btn share-btn" onclick="shareData()">📤 分享打卡</button>
            <button class="reset-btn" onclick="resetAll()">🔄 重置本周</button>
        </div>
    </div>

                { emoji: '🐟', name: '香煎鳕鱼+芦笋', shop: '海鲜轻食', price: 48, originalPrice: 62, deliveryTime: '40分钟', deliveryFee: 2, sold: '700+', cal: '320卡', tags: ['Omega-3', '低脂'] },
                { emoji: '🥒', name: '拍黄瓜+凉拌木耳+小米粥', shop: '凉拌菜馆', price: 18.8, originalPrice: 25, deliveryTime: '25分钟', deliveryFee: 0, sold: '1500+', cal: '220卡', tags: ['清肠胃', '低卡'] },
                { emoji: '🥦', name: '蒜蓉西兰花+蒸蛋羹', shop: '蒸菜馆', price: 22, originalPrice: 28, deliveryTime: '28分钟', deliveryFee: 1, sold: '1100+', cal: '240卡', tags: ['抗氧化', '嫩滑'] },
                { emoji: '🍄', name: '金针菇肥牛（少油）', shop: '日韩料理', price: 38, originalPrice: 48, deliveryTime: '38分钟', deliveryFee: 2, sold: '2300+', cal: '350卡', tags: ['刷脂', '饱腹'] },
                { emoji: '🦑', name: '爆炒鱿鱼圈+生菜', shop: '海鲜大排档', price: 35.8, originalPrice: 45, deliveryTime: '35分钟', deliveryFee: 1, sold: '900+', cal: '280卡', tags: ['高蛋白', '低卡'] },
                { emoji: '🥬', name: '上汤娃娃菜+蒸南瓜', shop: '粤菜馆', price: 26, originalPrice: 32, deliveryTime: '32分钟', deliveryFee: 1, sold: '1300+', cal: '200卡', tags: ['消肿', '养胃'] },
                { emoji: '🥗', name: '牛油果虾仁沙拉', shop: '高端轻食', price: 42, originalPrice: 55, deliveryTime: '45分钟', deliveryFee: 3, sold: '600+', cal: '340卡', tags: ['好脂肪', '优质蛋白'] }
            ]
        };

        // 当前显示的商品
        let currentProducts = {
            breakfast: [],
            lunch: [],
            dinner: []
        };

        // 初始化
        function init() {
            loadData();
            checkNewDay();
            generateProducts();
            renderProducts();
            updateDisplay();
        }

        // 生成随机商品
        function generateProducts() {
            const getRandomItems = (arr, count) => {
                const shuffled = [...arr].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, count);
            };

            currentProducts.breakfast = getRandomItems(productPool.breakfast, 2);
            currentProducts.lunch = getRandomItems(productPool.lunch, 3);
            currentProducts.dinner = getRandomItems(productPool.dinner, 2);
        }

        // 渲染商品卡片
        function renderProducts() {
            const renderCards = (products, containerId) => {
                const container = document.getElementById(containerId);
                container.innerHTML = products.map(p => `
                    <div class="product-card">
                        <div class="product-image">
                            ${p.emoji}
                            <span class="product-sold">月售${p.sold}</span>
                        </div>
                        <div class="product-content">
                            <div class="product-shop">${p.shop}</div>
                            <div class="product-name">${p.name}</div>
                            <div class="product-delivery">
                                <span class="delivery-item">🕐 ${p.deliveryTime}</span>
                                <span class="delivery-item">🛵 配送${p.deliveryFee === 0 ? '免费' : '¥' + p.deliveryFee}</span>
                            </div>
                            <div class="product-tags">
                                ${p.tags.map(t => `<span class="product-tag">${t}</span>`).join('')}
                                <span class="product-tag calorie">🔥 ${p.cal}</span>
                            </div>
                            <div class="product-bottom">
                                <div class="product-price">
                                    <span class="price-current">${p.price}</span>
                                    <span class="price-original">¥${p.originalPrice}</span>
                                </div>
                                <a href="https://s.taobao.com/search?q=${encodeURIComponent(p.name)}" target="_blank" class="buy-btn">去购买</a>
                            </div>
                        </div>
                    </div>
                `).join('');
            };

            renderCards(currentProducts.breakfast, 'breakfastCards');
            renderCards(currentProducts.lunch, 'lunchCards');
            renderCards(currentProducts.dinner, 'dinnerCards');
        }

        // 切换日期
        function selectDay(index) {
            data.currentDay = index;
            document.querySelectorAll('.week-day-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            document.getElementById('dayTitle').textContent = days[index] + '外卖';
            generateProducts();
            renderProducts();
            saveData();
        }

        // 换一换
        function refreshMeals() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('spinning');
            setTimeout(() => btn.classList.remove('spinning'), 500);
            generateProducts();
            renderProducts();
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('milkteaCount').textContent = data.milktea;
            document.getElementById('pupuCount').textContent = data.pupu;
            document.getElementById('waterCount').textContent = data.water;

            document.getElementById('milkteaMinus').disabled = data.milktea <= 0;
            document.getElementById('pupuMinus').disabled = data.pupu <= 0;
            document.getElementById('waterMinus').disabled = data.water <= 0;

            // 水桶
            const percent = Math.min((data.water / BUCKET_TOTAL) * 100, 100);
            document.getElementById('bucketWater').style.height = percent + '%';
            document.getElementById('bucketLabel').textContent = Math.floor(percent) + '%';

            // 分享卡片
            document.getElementById('sharePupu').textContent = data.pupu;
            document.getElementById('shareMilktea').textContent = data.milktea;
            document.getElementById('shareWater').textContent = data.water;
            document.getElementById('shareWaterFill').style.width = percent + '%';
            document.getElementById('shareWaterText').textContent = `${data.water}/${BUCKET_TOTAL}ml`;

            // 打卡按钮
            document.getElementById('checkinBtn').disabled = data.todayChecked;
            document.getElementById('checkinBtn').textContent = data.todayChecked ? '✅ 已打卡' : '✅ 今日打卡';
        }

        // 修改计数
        function changeCount(type, delta) {
            if (type === 'milktea') {
                data.milktea = Math.max(0, data.milktea + delta);
                if (delta > 0) showFeedback('🧋');
            } else if (type === 'pupu') {
                data.pupu = Math.max(0, data.pupu + delta);
                if (delta > 0) showFeedback('💩');
            }
            updateDisplay();
            saveData();
        }

        // 修改喝水
        function changeWater(delta) {
            data.water = Math.max(0, Math.min(BUCKET_TOTAL, data.water + delta));
            if (delta > 0) showFeedback('💧');
            updateDisplay();
            saveData();
        }

        // 打卡
        function doCheckIn() {
            if (!data.todayChecked) {
                data.todayChecked = true;
                data.checkedDays[data.currentDay] = true;
                showFeedback('✅');
                updateDisplay();
                saveData();
            }
        }

        // 分享
        async function shareData() {
            const text = `📸 今日健康打卡\n💩 噗噗: ${data.pupu}次\n🧋 奶茶: ${data.milktea}杯\n💧 喝水: ${data.water}/${BUCKET_TOTAL}ml\n\n一起来健康生活吧！`;

            if (navigator.share) {
                try {
                    await navigator.share({ title: '今日健康打卡', text });
                } catch (e) {}
            } else {
                navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板！'));
            }
        }

        // 重置
        function resetAll() {
            if (confirm('确定重置所有数据？')) {
                data = {
                    currentDay: 0,
                    milktea: 0,
                    pupu: 0,
                    water: 0,
                    checkedDays: [false, false, false, false, false, false, false],
                    todayChecked: false
                };
                selectDay(0);
                updateDisplay();
                saveData();
            }
        }

        // 检查新的一天
        function checkNewDay() {
            const today = new Date().toDateString();
            const saved = localStorage.getItem('healthTrackerDate');
            if (saved !== today) {
                data.water = 0;
                data.todayChecked = false;
                localStorage.setItem('healthTrackerDate', today);
                saveData();
            }
        }

        // 显示反馈
        function showFeedback(emoji) {
            const popup = document.createElement('div');
            popup.className = 'feedback-popup';
            popup.textContent = emoji;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        // 保存加载
        function saveData() {
            localStorage.setItem('healthTracker', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('healthTracker');
            if (saved) {
                data = { ...data, ...JSON.parse(saved) };
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
