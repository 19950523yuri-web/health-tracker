<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本周健康外卖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            padding: 15px;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        /* 周导航 */
        .week-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 16px;
            padding: 12px 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .week-days {
            display: flex;
            gap: 6px;
        }

        .week-day-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .week-day-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .week-day-btn:hover:not(.active) {
            background: #e8e8e8;
        }

        /* 外卖区域 */
        .meal-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            border: none;
            background: #f0f4ff;
            color: #667eea;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #e0e8ff;
        }

        .refresh-btn.spinning {
            animation: spin 0.5s ease-out;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 餐段标题 */
        .meal-time {
            margin-bottom: 20px;
        }

        .meal-time:last-child {
            margin-bottom: 0;
        }

        .meal-time-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #f0f0f0;
        }

        .meal-time-icon {
            font-size: 22px;
        }

        .meal-time-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }

        /* 商品列表 */
        .food-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 12px;
            border: 1px solid #f0f0f0;
            transition: all 0.2s;
        }

        .product-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .product-image {
            width: 80px;
            height: 80px;
            min-width: 80px;
            background: linear-gradient(135deg, #f5f7fa, #e4e8ec);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            position: relative;
        }

        .product-sold {
            position: absolute;
            top: -4px;
            left: -4px;
            background: #ff5722;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 8px;
            font-weight: 600;
        }

        .product-info {
            flex: 1;
            min-width: 0;
        }

        .product-header {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            margin-bottom: 6px;
        }

        .product-shop {
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .product-tags {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .product-tag {
            font-size: 11px;
            padding: 2px 8px;
            background: #f0f4ff;
            color: #667eea;
            border-radius: 4px;
        }

        .product-nutrition {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #666;
            margin-bottom: 6px;
        }

        .nutrition-item {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .nutrition-item.calorie {
            color: #ff5722;
            font-weight: 600;
        }

        .product-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .price-current {
            font-size: 18px;
            font-weight: 700;
            color: #ff5722;
        }

        .price-current::before {
            content: '¥';
            font-size: 12px;
        }

        .delivery-time {
            font-size: 12px;
            color: #999;
        }

        /* 打卡区域 */
        .track-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .track-card {
            background: white;
            border-radius: 20px;
            padding: 18px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .track-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .track-count {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .track-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .track-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .track-btn.minus {
            background: #f5f5f5;
            color: #666;
        }

        .track-btn.minus:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .track-btn.plus {
            background: #e3f2fd;
            color: #1976d2;
        }

        .track-btn.plus:hover {
            background: #bbdefb;
        }

        .track-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 水桶 */
        .water-bucket {
            position: relative;
            width: 50px;
            height: 60px;
            margin: 0 auto 10px;
            background: linear-gradient(180deg, #e3f2fd, #bbdefb);
            border-radius: 5px 5px 10px 10px;
            border: 2px solid #90caf9;
            overflow: hidden;
        }

        .bucket-water {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, #4fc3f7, #0288d1);
            transition: height 0.3s ease-out;
        }

        .bucket-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: 700;
            color: #01579b;
            z-index: 10;
        }

        /* 分享卡片 */
        .share-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .share-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            padding: 20px;
            color: white;
            margin-bottom: 15px;
        }

        .share-title {
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
        }

        .share-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        .share-stat {
            text-align: center;
        }

        .share-stat-icon {
            font-size: 24px;
        }

        .share-stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .share-stat-label {
            font-size: 11px;
            opacity: 0.9;
        }

        .share-water-bar {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .share-water-fill {
            height: 100%;
            background: #4fc3f7;
            border-radius: 10px;
            transition: width 0.3s;
        }

        .share-water-text {
            text-align: center;
            font-size: 12px;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .checkin-btn {
            background: #4caf50;
            color: white;
        }

        .checkin-btn:hover {
            background: #45a049;
        }

        .checkin-btn:disabled {
            background: #ccc;
        }

        .share-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .share-btn:hover {
            opacity: 0.95;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ffebee;
            color: #c62828;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 动画 */
        .feedback-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            pointer-events: none;
            animation: popupFloat 0.8s ease-out forwards;
            z-index: 1000;
        }

        @keyframes popupFloat {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍱 本周健康外卖</h1>

        <!-- 周导航 -->
        <div class="week-nav">
            <div class="week-days" id="weekDays">
                <button class="week-day-btn active" onclick="selectDay(0)">一</button>
                <button class="week-day-btn" onclick="selectDay(1)">二</button>
                <button class="week-day-btn" onclick="selectDay(2)">三</button>
                <button class="week-day-btn" onclick="selectDay(3)">四</button>
                <button class="week-day-btn" onclick="selectDay(4)">五</button>
                <button class="week-day-btn" onclick="selectDay(5)">六</button>
                <button class="week-day-btn" onclick="selectDay(6)">日</button>
            </div>
        </div>

        <!-- 今日外卖推荐 -->
        <div class="meal-section">
            <div class="section-header">
                <div class="section-title" id="dayTitle">周一外卖</div>
                <button class="refresh-btn" onclick="refreshMeals()">
                    <span>🔄</span> 换一换
                </button>
            </div>

            <!-- 今日饮食作用 -->
            <div class="meal-desc" style="background: linear-gradient(135deg, #f0f4ff, #e8f5e9); border-radius: 12px; padding: 15px; margin-bottom: 20px;">
                <div style="font-size: 14px; font-weight: 700; color: #667eea; margin-bottom: 8px; display: flex; align-items: center; gap: 5px;">
                    <span>📋</span> 今日饮食作用
                </div>
                <div style="font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 10px;" id="mealDesc">
                    高蛋白低脂组合，帮助提升代谢，控制热量摄入的同时保证饱腹感，适合减脂期食用。
                </div>
                <div style="display: flex; gap: 8px; flex-wrap: wrap;" id="mealTags">
                    <span style="font-size: 11px; padding: 4px 10px; background: white; border-radius: 12px; color: #667eea; font-weight: 600;">🔥 燃脂</span>
                    <span style="font-size: 11px; padding: 4px 10px; background: white; border-radius: 12px; color: #667eea; font-weight: 600;">💪 高蛋白</span>
                    <span style="font-size: 11px; padding: 4px 10px; background: white; border-radius: 12px; color: #667eea; font-weight: 600;">🥗 低卡</span>
                </div>
            </div>

            <!-- 早餐建议 -->
            <div class="meal-time">
                <div class="meal-time-header">
                    <span class="meal-time-icon">🌅</span>
                    <span class="meal-time-title">早餐建议</span>
                </div>
                <div class="food-list" id="breakfastList">

                </div>
            </div>

            <!-- 午餐建议 -->
            <div class="meal-time">
                <div class="meal-time-header">
                    <span class="meal-time-icon">☀️</span>
                    <span class="meal-time-title">午餐建议</span>
                </div>
                <div class="food-list" id="lunchList">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 晚餐建议 -->

                <div class="meal-time-header">
                    <span class="meal-time-icon">🌙</span>
                    <span class="meal-time-title">晚餐建议</span>
                </div>
                <div class="food-list" id="dinnerList">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 打卡区域 -->
        <div class="track-section">
            <div class="track-card">
                <div class="track-icon">🧋</div>
                <div class="track-count" id="milkteaCount">0</div>
                <div class="track-controls">
                    <button class="track-btn minus" onclick="changeCount('milktea', -1)" id="milkteaMinus" disabled>−</button>
                    <button class="track-btn plus" onclick="changeCount('milktea', 1)">+</button>
                </div>
            </div>
            <div class="track-card">
                <div class="track-icon">💩</div>
                <div class="track-count" id="pupuCount">0</div>
                <div class="track-controls">
                    <button class="track-btn minus" onclick="changeCount('pupu', -1)" id="pupuMinus" disabled>−</button>
                    <button class="track-btn plus" onclick="changeCount('pupu', 1)">+</button>
                </div>
            </div>
            <div class="track-card">
                <div class="water-bucket">
                    <div class="bucket-water" id="bucketWater" style="height: 0%"></div>
                    <div class="bucket-label" id="bucketLabel">0%</div>
                </div>
                <div class="track-count" id="waterCount">0</div>
                <div class="track-controls">
                    <button class="track-btn minus" onclick="changeWater(-150)" id="waterMinus" disabled>−</button>
                    <button class="track-btn plus" onclick="changeWater(150)">+</button>
                </div>
            </div>
        </div>

        <!-- 分享卡片 -->
        <div class="share-section">
            <div class="share-card">
                <div class="share-title">📸 今日打卡</div>
                <div class="share-stats">
                    <div class="share-stat">
                        <div class="share-stat-icon">💩</div>
                        <div class="share-stat-value" id="sharePupu">0</div>

            <button class="reset-btn" onclick="resetAll()">🔄 重置本周</button>
        </div>
    </div>

                { emoji: '🦐', name: '白灼虾套餐（12只）+蔬菜', shop: '海鲜饭堂', price: 52, deliveryTime: '45分钟', sold: '月售900+', cal: '450卡', protein: '48g', carbs: '15g', fat: '8g', tags: ['高蛋白', '低脂低卡'] },
                { emoji: '🥦', name: '西兰花炒牛肉+紫薯', shop: '健身厨房', price: 38.8, deliveryTime: '38分钟', sold: '月售1600+', cal: '490卡', protein: '35g', carbs: '42g', fat: '16g', tags: ['高铁补血', '抗氧化'] },
                { emoji: '🍲', name: '番茄鸡蛋荞麦面', shop: '面食记', price: 22, deliveryTime: '30分钟', sold: '月售2200+', cal: '420卡', protein: '18g', carbs: '58g', fat: '12g', tags: ['番茄红素', '饱腹主食'] },
                { emoji: '🥗', name: '凯撒沙拉+烤鸡胸', shop: '沙拉实验室', price: 35, deliveryTime: '32分钟', sold: '月售1400+', cal: '380卡', protein: '32g', carbs: '12g', fat: '20g', tags: ['刷脂神器', '清爽解腻'] }
            ],
            dinner: [
                { emoji: '🥗', name: '混合蔬菜沙拉+油醋汁', shop: '轻食沙拉', price: 25, deliveryTime: '30分钟', sold: '月售2000+', cal: '180卡', protein: '6g', carbs: '18g', fat: '10g', tags: ['超低卡', '膳食纤维'] },
                { emoji: '🐟', name: '香煎鳕鱼+芦笋', shop: '海鲜轻食', price: 48, deliveryTime: '40分钟', sold: '月售700+', cal: '320卡', protein: '38g', carbs: '8g', fat: '14g', tags: ['Omega-3', '低脂高蛋白'] },
                { emoji: '🥒', name: '拍黄瓜+凉拌木耳+小米粥', shop: '凉拌菜馆', price: 18.8, deliveryTime: '25分钟', sold: '月售1500+', cal: '220卡', protein: '8g', carbs: '28g', fat: '8g', tags: ['清肠胃', '低卡爽口'] },
                { emoji: '🥦', name: '蒜蓉西兰花+蒸蛋羹', shop: '蒸菜馆', price: 22, deliveryTime: '28分钟', sold: '月售1100+', cal: '240卡', protein: '16g', carbs: '12g', fat: '14g', tags: ['抗氧化', '嫩滑可口'] },
                { emoji: '🍄', name: '金针菇肥牛（少油）', shop: '日韩料理', price: 38, deliveryTime: '38分钟', sold: '月售2300+', cal: '350卡', protein: '28g', carbs: '15g', fat: '22g', tags: ['刷脂饱腹', '鲜香可口'] },
                { emoji: '🦑', name: '爆炒鱿鱼圈+生菜', shop: '海鲜大排档', price: 35.8, deliveryTime: '35分钟', sold: '月售900+', cal: '280卡', protein: '32g', carbs: '10g', fat: '12g', tags: ['高蛋白', '低卡美味'] }
            ]
        };

        // 当前显示的商品
        let currentProducts = {
            breakfast: [],
            lunch: [],
            dinner: []
        };

        // 初始化
        function init() {
            loadData();
            checkNewDay();
            generateProducts();
            renderProducts();
            updateDisplay();
        }

        // 生成随机商品
        function generateProducts() {
            const getRandomItems = (arr, count) => {
                const shuffled = [...arr].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, count);
            };

            currentProducts.breakfast = getRandomItems(productPool.breakfast, 2);
            currentProducts.lunch = getRandomItems(productPool.lunch, 3);
            currentProducts.dinner = getRandomItems(productPool.dinner, 2);

            // 更新饮食作用
            const desc = mealDescs[Math.floor(Math.random() * mealDescs.length)];
            document.getElementById('mealDesc').textContent = desc.text;
            document.getElementById('mealTags').innerHTML = desc.tags.map(t => `<span style="font-size: 11px; padding: 4px 10px; background: white; border-radius: 12px; color: #667eea; font-weight: 600;">${t}</span>`).join('');
        }

        // 渲染商品列表
        function renderProducts() {
            const renderList = (products, containerId) => {
                const container = document.getElementById(containerId);
                container.innerHTML = products.map(p => `
                    <a href="https://s.taobao.com/search?q=${encodeURIComponent(p.name)}" target="_blank" class="product-item" style="text-decoration: none; color: inherit;">
                        <div class="product-image">
                            ${p.emoji}
                            <span class="product-sold">${p.sold}</span>
                        </div>
                        <div class="product-info">
                            <div class="product-header">
                                <span class="product-shop">${p.shop}</span>
                            </div>
                            <div class="product-name">${p.name}</div>
                            <div class="product-tags">
                                ${p.tags.map(t => `<span class="product-tag">${t}</span>`).join('')}
                            </div>
                            <div class="product-nutrition">
                                <span class="nutrition-item calorie">🔥 ${p.cal}</span>
                                <span class="nutrition-item">🥩 ${p.protein || '20g'}</span>
                                <span class="nutrition-item">🍞 ${p.carbs || '30g'}</span>
                                <span class="nutrition-item">🥑 ${p.fat || '8g'}</span>
                            </div>
                            <div class="product-bottom">
                                <div class="product-price-row">
                                    <span class="price-current">${p.price}</span>
                                </div>
                                <span class="delivery-time">🕐 ${p.deliveryTime}</span>
                            </div>
                        </div>
                    </a>
                `).join('');
            };

            renderList(currentProducts.breakfast, 'breakfastList');
            renderList(currentProducts.lunch, 'lunchList');
            renderList(currentProducts.dinner, 'dinnerList');
        }

        // 切换日期
        function selectDay(index) {
            data.currentDay = index;
            document.querySelectorAll('.week-day-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            document.getElementById('dayTitle').textContent = days[index] + '外卖';
            generateProducts();
            renderProducts();
            saveData();
        }

        // 换一换
        function refreshMeals() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('spinning');
            setTimeout(() => btn.classList.remove('spinning'), 500);
            generateProducts();
            renderProducts();
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('milkteaCount').textContent = data.milktea;
            document.getElementById('pupuCount').textContent = data.pupu;
            document.getElementById('waterCount').textContent = data.water;

            document.getElementById('milkteaMinus').disabled = data.milktea <= 0;
            document.getElementById('pupuMinus').disabled = data.pupu <= 0;
            document.getElementById('waterMinus').disabled = data.water <= 0;

            // 水桶
            const percent = Math.min((data.water / BUCKET_TOTAL) * 100, 100);
            document.getElementById('bucketWater').style.height = percent + '%';
            document.getElementById('bucketLabel').textContent = Math.floor(percent) + '%';

            // 分享卡片
            document.getElementById('sharePupu').textContent = data.pupu;
            document.getElementById('shareMilktea').textContent = data.milktea;
            document.getElementById('shareWater').textContent = data.water;
            document.getElementById('shareWaterFill').style.width = percent + '%';
            document.getElementById('shareWaterText').textContent = `${data.water}/${BUCKET_TOTAL}ml`;

            // 打卡按钮
            document.getElementById('checkinBtn').disabled = data.todayChecked;
            document.getElementById('checkinBtn').textContent = data.todayChecked ? '✅ 已打卡' : '✅ 今日打卡';
        }

        // 修改计数
        function changeCount(type, delta) {
            if (type === 'milktea') {
                data.milktea = Math.max(0, data.milktea + delta);
                if (delta > 0) showFeedback('🧋');
            } else if (type === 'pupu') {
                data.pupu = Math.max(0, data.pupu + delta);
                if (delta > 0) showFeedback('💩');
            }
            updateDisplay();
            saveData();
        }

        // 修改喝水
        function changeWater(delta) {
            data.water = Math.max(0, Math.min(BUCKET_TOTAL, data.water + delta));
            if (delta > 0) showFeedback('💧');
            updateDisplay();
            saveData();
        }

        // 打卡
        function doCheckIn() {
            if (!data.todayChecked) {
                data.todayChecked = true;
                data.checkedDays[data.currentDay] = true;
                showFeedback('✅');
                updateDisplay();
                saveData();
            }
        }

        // 分享
        async function shareData() {
            const text = `📸 今日健康打卡\n💩 噗噗: ${data.pupu}次\n🧋 奶茶: ${data.milktea}杯\n💧 喝水: ${data.water}/${BUCKET_TOTAL}ml\n\n一起来健康生活吧！`;

            if (navigator.share) {
                try {
                    await navigator.share({ title: '今日健康打卡', text });
                } catch (e) {}
            } else {
                navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板！'));
            }
        }

        // 重置
        function resetAll() {
            if (confirm('确定重置所有数据？')) {
                data = {
                    currentDay: 0,
                    milktea: 0,
                    pupu: 0,
                    water: 0,
                    checkedDays: [false, false, false, false, false, false, false],
                    todayChecked: false
                };
                selectDay(0);
                updateDisplay();
                saveData();
            }
        }

        // 检查新的一天
        function checkNewDay() {
            const today = new Date().toDateString();
            const saved = localStorage.getItem('healthTrackerDate');
            if (saved !== today) {
                data.water = 0;
                data.todayChecked = false;
                localStorage.setItem('healthTrackerDate', today);
                saveData();
            }
        }

        // 显示反馈
        function showFeedback(emoji) {
            const popup = document.createElement('div');
            popup.className = 'feedback-popup';
            popup.textContent = emoji;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        // 保存加载
        function saveData() {
            localStorage.setItem('healthTracker', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('healthTracker');
            if (saved) {
                data = { ...data, ...JSON.parse(saved) };
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
