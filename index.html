<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本周健康食谱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            padding: 15px;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        /* 周导航 */
        .week-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-radius: 16px;
            padding: 12px 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .week-days {
            display: flex;
            gap: 6px;
        }

        .week-day-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .week-day-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .week-day-btn:hover:not(.active) {
            background: #e8e8e8;
        }

        /* 食谱主区域 */
        .meal-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            border: none;
            background: #f0f4ff;
            color: #667eea;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: #e0e8ff;
        }

        .refresh-btn.spinning {
            animation: spin 0.5s ease-out;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 食谱说明 */
        .meal-desc {
            background: linear-gradient(135deg, #f0f4ff, #e8f5e9);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .meal-desc-title {
            font-size: 14px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .meal-desc-text {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }

        .meal-desc-tags {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .meal-tag {
            font-size: 11px;
            padding: 4px 10px;
            background: white;
            border-radius: 12px;
            color: #667eea;
            font-weight: 600;
        }

        /* 三餐区域 */
        .meal-time {
            margin-bottom: 20px;
        }

        .meal-time:last-child {
            margin-bottom: 0;
        }

        .meal-time-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .meal-time-icon {
            font-size: 20px;
        }

        .meal-time-title {
            font-size: 15px;
            font-weight: 700;
            color: #333;
        }

        .meal-time-cal {
            font-size: 12px;
            color: #999;
            margin-left: auto;
        }

        /* 食物卡片 */
        .food-cards {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none;
        }

        .food-cards::-webkit-scrollbar {
            display: none;
        }

        .food-card {
            min-width: 110px;
            background: #fafafa;
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            border: 2px solid #f0f0f0;
            transition: all 0.2s;
        }

        .food-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .food-emoji {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .food-name {
            font-weight: 600;
            color: #333;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .food-cal {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
        }

        .food-benefit {
            font-size: 10px;
            color: #4CAF50;
            padding: 3px 8px;
            background: #e8f5e9;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .buy-btn {
            display: inline-block;
            padding: 6px 12px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .buy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 3px 10px rgba(238, 90, 90, 0.3);
        }

        /* 打卡区域 */
        .track-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .track-card {
            background: white;
            border-radius: 20px;
            padding: 18px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .track-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .track-count {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .track-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .track-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .track-btn.minus {
            background: #f5f5f5;
            color: #666;
        }

        .track-btn.minus:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .track-btn.plus {
            background: #e3f2fd;
            color: #1976d2;
        }

        .track-btn.plus:hover {
            background: #bbdefb;
        }

        .track-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 水桶 */
        .water-bucket {
            position: relative;
            width: 50px;
            height: 60px;
            margin: 0 auto 10px;
            background: linear-gradient(180deg, #e3f2fd, #bbdefb);
            border-radius: 5px 5px 10px 10px;
            border: 2px solid #90caf9;
            overflow: hidden;
        }

        .bucket-water {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(180deg, #4fc3f7, #0288d1);
            transition: height 0.3s ease-out;
        }

        .bucket-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: 700;
            color: #01579b;
            z-index: 10;
        }

        /* 分享卡片 */
        .share-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .share-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            padding: 20px;
            color: white;
            margin-bottom: 15px;
        }

        .share-title {
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 15px;
        }

        .share-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        .share-stat {
            text-align: center;
        }

        .share-stat-icon {
            font-size: 24px;
        }

        .share-stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .share-stat-label {
            font-size: 11px;
            opacity: 0.9;
        }

        .share-water-bar {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .share-water-fill {
            height: 100%;
            background: #4fc3f7;
            border-radius: 10px;
            transition: width 0.3s;
        }

        .share-water-text {
            text-align: center;
            font-size: 12px;
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .checkin-btn {
            background: #4caf50;
            color: white;
        }

        .checkin-btn:hover {
            background: #45a049;
        }

        .checkin-btn:disabled {
            background: #ccc;
        }

        .share-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .share-btn:hover {
            opacity: 0.95;
        }

        .reset-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #ffebee;
            color: #c62828;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 动画 */
        .feedback-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            pointer-events: none;
            animation: popupFloat 0.8s ease-out forwards;
            z-index: 1000;
        }

        @keyframes popupFloat {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 本周健康食谱</h1>

        <!-- 周导航 -->
        <div class="week-nav">
            <div class="week-days" id="weekDays">
                <button class="week-day-btn active" onclick="selectDay(0)">一</button>
                <button class="week-day-btn" onclick="selectDay(1)">二</button>
                <button class="week-day-btn" onclick="selectDay(2)">三</button>
                <button class="week-day-btn" onclick="selectDay(3)">四</button>
                <button class="week-day-btn" onclick="selectDay(4)">五</button>
                <button class="week-day-btn" onclick="selectDay(5)">六</button>
                <button class="week-day-btn" onclick="selectDay(6)">日</button>
            </div>
        </div>

        <!-- 今日食谱 -->
        <div class="meal-section">
            <div class="section-header">
                <div class="section-title" id="dayTitle">周一食谱</div>
                <button class="refresh-btn" onclick="refreshMeals()">
                    <span>🔄</span> 换一换
                </button>
            </div>

            <!-- 食谱说明 -->
            <div class="meal-desc">
                <div class="meal-desc-title">
                    <span>📋</span> 今日食谱作用
                </div>
                <div class="meal-desc-text" id="mealDesc">
                    高蛋白低脂组合，帮助提升代谢，控制热量摄入的同时保证饱腹感，适合减脂期食用。
                </div>
                <div class="meal-desc-tags">
                    <span class="meal-tag">🔥 燃脂</span>
                    <span class="meal-tag">💪 高蛋白</span>
                    <span class="meal-tag">🥗 低卡</span>
                </div>
            </div>

            <!-- 早餐 -->
            <div class="meal-time">
                <div class="meal-time-header">
                    <span class="meal-time-icon">🌅</span>
                    <span class="meal-time-title">早餐</span>
                    <span class="meal-time-cal" id="breakfastCal">约350卡</span>
                </div>
                <div class="food-cards" id="breakfastCards">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 午餐 -->
            <div class="meal-time">
                <div class="meal-time-header">
                    <span class="meal-time-icon">☀️</span>
                    <span class="meal-time-title">午餐</span>
                    <span class="meal-time-cal" id="lunchCal">约500卡</span>
                </div>
                <div class="food-cards" id="lunchCards">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 晚餐 -->
            <div class="meal-time">
                <div class="meal-time-header">
                    <span class="meal-time-icon">🌙</span>
                    <span class="meal-time-title">晚餐</span>
                    <span class="meal-time-cal" id="dinnerCal">约400卡</span>
                </div>
                <div class="food-cards" id="dinnerCards">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 打卡区域 -->
        <div class="track-section">
            <div class="track-card">
                <div class="track-icon">🧋</div>
                <div class="track-count" id="milkteaCount">0</div>
                <div class="track-controls">
                    <button class="track-btn minus" onclick="changeCount('milktea', -1)" id="milkteaMinus" disabled>−</button>
                    <button class="track-btn plus" onclick="changeCount('milktea', 1)">+</button>
                </div>
            </div>
            <div class="track-card">
                <div class="track-icon">💩</div>
                <div class="track-count" id="pupuCount">0</div>
                <div class="track-controls">
                    <button class="track-btn minus" onclick="changeCount('pupu', -1)" id="pupuMinus" disabled>−</button>
                    <button class="track-btn plus" onclick="changeCount('pupu', 1)">+</button>
                </div>
            </div>
            <div class="track-card">
                <div class="water-bucket">
                    <div class="bucket-water" id="bucketWater" style="height: 0%"></div>
                    <div class="bucket-label" id="bucketLabel">0%</div>
                </div>
                <div class="track-count" id="waterCount">0</div>
                <div class="track-controls">
                    <button class="track-btn minus" onclick="changeWater(-150)" id="waterMinus" disabled>−</button>
                    <button class="track-btn plus" onclick="changeWater(150)">+</button>
                </div>
            </div>
        </div>

        <!-- 分享卡片 -->
        <div class="share-section">
            <div class="share-card">
                <div class="share-title">📸 今日打卡</div>
                <div class="share-stats">
                    <div class="share-stat">
                        <div class="share-stat-icon">💩</div>
                        <div class="share-stat-value" id="sharePupu">0</div>
                        <div class="share-stat-label">噗噗</div>
                    </div>
                    <div class="share-stat">
                        <div class="share-stat-icon">🧋</div>
                        <div class="share-stat-value" id="shareMilktea">0</div>
                        <div class="share-stat-label">奶茶</div>
                    </div>
                    <div class="share-stat">
                        <div class="share-stat-icon">💧</div>
                        <div class="share-stat-value" id="shareWater">0</div>
                        <div class="share-stat-label">喝水ml</div>
                    </div>
                </div>
                <div class="share-water-bar">
                    <div class="share-water-fill" id="shareWaterFill" style="width: 0%"></div>
                </div>
                <div class="share-water-text">喝水进度 <span id="shareWaterText">0/1500ml</span></div>
            </div>
            <button class="action-btn checkin-btn" id="checkinBtn" onclick="doCheckIn()">✅ 今日打卡</button>
            <button class="action-btn share-btn" onclick="shareData()">📤 分享打卡</button>
            <button class="reset-btn" onclick="resetAll()">🔄 重置本周</button>
        </div>
    </div>

    <script>
        // 数据
        const BUCKET_TOTAL = 1500;
        const MILKTEA_LIMIT = 3;

        let data = {
            currentDay: 0,
            milktea: 0,
            pupu: 0,
            water: 0,
            checkedDays: [false, false, false, false, false, false, false],
            todayChecked: false
        };

        const days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

        // 食谱数据池
        const mealPool = {
            breakfast: [
                { emoji: '🥚', name: '水煮蛋', cal: '70卡', benefit: '高蛋白', search: '鸡蛋' },
                { emoji: '🥛', name: '无糖豆浆', cal: '45卡', benefit: '植物蛋白', search: '无糖豆浆' },
                { emoji: '🌾', name: '燕麦粥', cal: '120卡', benefit: '低GI饱腹', search: '燕麦片' },
                { emoji: '🥑', name: '牛油果', cal: '80卡', benefit: '好脂肪', search: '牛油果' },
                { emoji: '🍠', name: '蒸红薯', cal: '90卡', benefit: '膳食纤维', search: '红薯' },
                { emoji: '🥣', name: '小米粥', cal: '90卡', benefit: '养胃', search: '小米' },
                { emoji: '🌽', name: '甜玉米', cal: '85卡', benefit: '粗粮', search: '玉米' },
                { emoji: '🥚', name: '茶叶蛋', cal: '75卡', benefit: '便携', search: '茶叶蛋' }
            ],
            lunch: [
                { emoji: '🐔', name: '鸡胸肉', cal: '120卡', benefit: '低脂高蛋白', search: '鸡胸肉' },
                { emoji: '🐟', name: '清蒸鱼', cal: '100卡', benefit: '优质蛋白', search: '鲈鱼' },
                { emoji: '🦐', name: '白灼虾', cal: '100卡', benefit: '高蛋白低脂', search: '基围虾' },
                { emoji: '🥦', name: '西兰花', cal: '30卡', benefit: '高纤维', search: '西兰花' },
                { emoji: '🥬', name: '炒菠菜', cal: '25卡', benefit: '补铁', search: '菠菜' },
                { emoji: '🍄', name: '金针菇', cal: '30卡', benefit: '刷脂', search: '金针菇' },
                { emoji: '🥒', name: '拍黄瓜', cal: '20卡', benefit: '消肿', search: '黄瓜' },
                { emoji: '🐮', name: '牛肉片', cal: '130卡', benefit: '增肌', search: '牛腱子' }
            ],
            dinner: [
                { emoji: '🥗', name: '生菜沙拉', cal: '25卡', benefit: '超低卡', search: '生菜' },
                { emoji: '🍅', name: '小番茄', cal: '20卡', benefit: '维C', search: '圣女果' },
                { emoji: '🥒', name: '拌黄瓜', cal: '20卡', benefit: '清爽', search: '黄瓜' },
                { emoji: '🥦', name: '蒜蓉西兰花', cal: '35卡', benefit: '抗氧化', search: '西兰花' },
                { emoji: '🐟', name: '鳕鱼', cal: '90卡', benefit: '鲜嫩', search: '鳕鱼' },
                { emoji: '🦑', name: '炒鱿鱼', cal: '80卡', benefit: '高蛋白', search: '鱿鱼' },
                { emoji: '🥬', name: '油麦菜', cal: '20卡', benefit: '通便', search: '油麦菜' },
                { emoji: '🍄', name: '杏鲍菇', cal: '35卡', benefit: '饱腹', search: '杏鲍菇' }
            ]
        };

        // 食谱说明
        const mealDescs = [
            { text: '高蛋白低脂组合，帮助提升代谢，控制热量摄入的同时保证饱腹感，适合减脂期食用。', tags: ['🔥 燃脂', '💪 高蛋白', '🥗 低卡'] },
            { text: '控糖维稳食谱，低GI食物组合，平稳血糖不犯困，适合上班族和学生党。', tags: ['🍬 控糖', '🧠 提神', '📊 稳血糖'] },
            { text: '清肠排毒组合，高纤维食物促进肠道蠕动，帮助噗噗通畅，改善便秘。', tags: ['🌿 排毒', '🌀 清肠', '✨ 轻盈'] },
            { text: '去水肿配方，高钾低钠食物帮助排出多余水分，让脸小一圈。', tags: ['💧 排水肿', '😊 瘦脸', '⚡ 活力'] },
            { text: '均衡营养组合，蛋白质碳水脂肪比例均衡，适合日常健康饮食。', tags: ['⚖️ 均衡', '🌈 营养', '💚 健康'] }
        ];

        // 当前显示的食谱
        let currentMeals = {
            breakfast: [],
            lunch: [],
            dinner: []
        };

        // 初始化
        function init() {
            loadData();
            checkNewDay();
            generateMeals();
            renderMeals();
            updateDisplay();
        }

        // 生成随机食谱
        function generateMeals() {
            const getRandomItems = (arr, count) => {
                const shuffled = [...arr].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, count);
            };

            currentMeals.breakfast = getRandomItems(mealPool.breakfast, 3);
            currentMeals.lunch = getRandomItems(mealPool.lunch, 4);
            currentMeals.dinner = getRandomItems(mealPool.dinner, 3);

            // 随机选择食谱说明
            const desc = mealDescs[Math.floor(Math.random() * mealDescs.length)];
            document.getElementById('mealDesc').textContent = desc.text;
            document.querySelector('.meal-desc-tags').innerHTML = desc.tags.map(t => `<span class="meal-tag">${t}</span>`).join('');
        }

        // 渲染食谱
        function renderMeals() {
            const renderCards = (meals, containerId) => {
                const container = document.getElementById(containerId);
                container.innerHTML = meals.map(food => `
                    <div class="food-card">
                        <div class="food-emoji">${food.emoji}</div>
                        <div class="food-name">${food.name}</div>
                        <div class="food-cal">${food.cal}</div>
                        <div class="food-benefit">${food.benefit}</div>
                        <a href="https://s.taobao.com/search?q=${encodeURIComponent(food.search)}" target="_blank" class="buy-btn">去购买</a>
                    </div>
                `).join('');
            };

            renderCards(currentMeals.breakfast, 'breakfastCards');
            renderCards(currentMeals.lunch, 'lunchCards');
            renderCards(currentMeals.dinner, 'dinnerCards');
        }

        // 切换日期
        function selectDay(index) {
            data.currentDay = index;
            document.querySelectorAll('.week-day-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            document.getElementById('dayTitle').textContent = days[index] + '食谱';
            generateMeals();
            renderMeals();
            saveData();
        }

        // 换一换
        function refreshMeals() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('spinning');
            setTimeout(() => btn.classList.remove('spinning'), 500);
            generateMeals();
            renderMeals();
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('milkteaCount').textContent = data.milktea;
            document.getElementById('pupuCount').textContent = data.pupu;
            document.getElementById('waterCount').textContent = data.water;

            document.getElementById('milkteaMinus').disabled = data.milktea <= 0;
            document.getElementById('pupuMinus').disabled = data.pupu <= 0;
            document.getElementById('waterMinus').disabled = data.water <= 0;

            // 水桶
            const percent = Math.min((data.water / BUCKET_TOTAL) * 100, 100);
            document.getElementById('bucketWater').style.height = percent + '%';
            document.getElementById('bucketLabel').textContent = Math.floor(percent) + '%';

            // 分享卡片
            document.getElementById('sharePupu').textContent = data.pupu;
            document.getElementById('shareMilktea').textContent = data.milktea;
            document.getElementById('shareWater').textContent = data.water;
            document.getElementById('shareWaterFill').style.width = percent + '%';
            document.getElementById('shareWaterText').textContent = `${data.water}/${BUCKET_TOTAL}ml`;

            // 打卡按钮
            document.getElementById('checkinBtn').disabled = data.todayChecked;
            document.getElementById('checkinBtn').textContent = data.todayChecked ? '✅ 已打卡' : '✅ 今日打卡';
        }

        // 修改计数
        function changeCount(type, delta) {
            if (type === 'milktea') {
                data.milktea = Math.max(0, data.milktea + delta);
                if (delta > 0) showFeedback('🧋');
            } else if (type === 'pupu') {
                data.pupu = Math.max(0, data.pupu + delta);
                if (delta > 0) showFeedback('💩');
            }
            updateDisplay();
            saveData();
        }

        // 修改喝水
        function changeWater(delta) {
            data.water = Math.max(0, Math.min(BUCKET_TOTAL, data.water + delta));
            if (delta > 0) showFeedback('💧');
            updateDisplay();
            saveData();
        }

        // 打卡
        function doCheckIn() {
            if (!data.todayChecked) {
                data.todayChecked = true;
                data.checkedDays[data.currentDay] = true;
                showFeedback('✅');
                updateDisplay();
                saveData();
            }
        }

        // 分享
        async function shareData() {
            const text = `📸 今日健康打卡\n💩 噗噗: ${data.pupu}次\n🧋 奶茶: ${data.milktea}杯\n💧 喝水: ${data.water}/${BUCKET_TOTAL}ml\n\n一起来健康生活吧！`;

            if (navigator.share) {
                try {
                    await navigator.share({ title: '今日健康打卡', text });
                } catch (e) {}
            } else {
                navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板！'));
            }
        }

        // 重置
        function resetAll() {
            if (confirm('确定重置所有数据？')) {
                data = {
                    currentDay: 0,
                    milktea: 0,
                    pupu: 0,
                    water: 0,
                    checkedDays: [false, false, false, false, false, false, false],
                    todayChecked: false
                };
                selectDay(0);
                updateDisplay();
                saveData();
            }
        }

        // 检查新的一天
        function checkNewDay() {
            const today = new Date().toDateString();
            const saved = localStorage.getItem('healthTrackerDate');
            if (saved !== today) {
                data.water = 0;
                data.todayChecked = false;
                localStorage.setItem('healthTrackerDate', today);
                saveData();
            }
        }

        // 显示反馈
        function showFeedback(emoji) {
            const popup = document.createElement('div');
            popup.className = 'feedback-popup';
            popup.textContent = emoji;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        // 保存加载
        function saveData() {
            localStorage.setItem('healthTracker', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('healthTracker');
            if (saved) {
                data = { ...data, ...JSON.parse(saved) };
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
