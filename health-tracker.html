            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }

        /* 目标选择模块 */
        .goal-section {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .goal-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .goal-option {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #e8e8e8;
            cursor: pointer;
            transition: all 0.2s;
        }

        .goal-option:hover {
            border-color: #4CAF50;
        }

        .goal-option.selected {
            border-color: #4CAF50;
            background: #f1f8f4;
        }

        .goal-option input[type="radio"] {
            display: none;
        }

        .goal-icon {
            font-size: 24px;
            margin-right: 12px;
        }

        .goal-text {
            flex: 1;
        }

        .goal-title {
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }

        .goal-desc {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
        }

        /* 每日推荐模块 */
        .daily-section {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .day-nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: #f0f0f0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        .nav-btn:hover {
            background: #e0e0e0;
        }

        .current-day {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .food-cards {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }

        .food-cards::-webkit-scrollbar {
            display: none;
        }

        .food-card {
            min-width: 140px;
            background: #fafafa;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 1px solid #eee;
        }

        .food-emoji {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .food-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .food-cal {
            font-size: 12px;
            color: #888;
        }

        .food-benefit {
            font-size: 11px;
            color: #4CAF50;
            margin-top: 6px;
            padding: 4px 8px;
            background: #e8f5e9;
            border-radius: 8px;
        }

        /* 记录模块 */
        .track-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .track-card {
            background: #fff;
            border-radius: 16px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            position: relative;
        }

        .track-card.warning {
            animation: shake 0.5s;
            border: 2px solid #f44336;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .limit-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #f44336;
            color: white;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .track-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .track-small-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .track-small-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .minus-btn {
            background: #ffebee;
            color: #c62828;
        }

        .minus-btn:hover:not(:disabled) {
            background: #ffcdd2;
        }

        .track-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .track-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .track-count {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
        }

        .track-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .milktea-btn {
            background: #e3f2fd;
            color: #1976d2;
            width: auto;
            padding: 8px 16px;
        }

        .milktea-btn:hover {
            background: #bbdefb;
        }

        .milktea-btn.over-limit {
            background: #ffebee;
            color: #c62828;
        }

        .pupu-btn {
            background: #fff3e0;
            color: #f57c00;
        }

        .pupu-btn:hover {
            background: #ffe0b2;
        }

        .water-btn {
            background: #e8f5e9;
            color: #388e3c;
        }

        .water-btn:hover {
            background: #c8e6c9;
        }

        /* 本周统计 */

            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .week-day {
            text-align: center;
            padding: 10px 5px;
            border-radius: 10px;
            background: #f5f5f5;
            font-size: 12px;
        }

        .week-day.completed {
            background: #4CAF50;
            color: white;
        }

        .week-day-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
        }

        .week-day.completed .week-day-label {

        }

        .week-day-icon {

        }

            padding: 15px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            background: #ffebee;
            color: #c62828;
            font-size: 15px;
            font-weight: 600;

        .reset-btn:hover {

        }

        /* 反馈动画 */
        .feedback-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            pointer-events: none;
            animation: popupFloat 1s ease-out forwards;
            z-index: 1000;
        }

        @keyframes popupFloat {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -80%) scale(1);

            </div>

        </div>

                <div class="track-count" id="milkteaCount">0</div>
                <div class="track-controls">
                    <button class="track-small-btn minus-btn" onclick="removeMilktea()" id="milkteaMinus" disabled>-</button>
                    <button class="track-btn milktea-btn" onclick="addMilktea()">+ 喝一杯</button>
                </div>
            </div>
            <div class="track-card">
                <div class="track-icon">💩</div>
                <div class="track-title">本周噗噗</div>
                <div class="track-count" id="pupuCount">0</div>

                <div class="track-count" id="waterCount">0</div>

            </div>
        </div>

        </div>

        // 初始化
        function init() {
            loadData();
            renderFoods();
            renderWeekGrid();
            updateDisplay();

            // 目标选择事件
            document.querySelectorAll('.goal-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.goal-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    this.querySelector('input').checked = true;
                    data.currentGoal = this.dataset.goal;
                    saveData();
                    renderFoods();
                });
            });
        }

        // 渲染食物卡片
        function renderFoods() {
            const container = document.getElementById('foodCards');
            const day = days[data.currentDayIndex];
            const foods = foodData[data.currentGoal][day];

            container.innerHTML = foods.map(food => `
                <div class="food-card">
                    <div class="food-emoji">${food.emoji}</div>
                    <div class="food-name">${food.name}</div>
                    <div class="food-cal">${food.cal}</div>
                    <div class="food-benefit">${food.benefit}</div>
                </div>
            `).join('');
        }

        // 切换日期
        function changeDay(delta) {
            data.currentDayIndex = (data.currentDayIndex + delta + 7) % 7;
            document.getElementById('currentDay').textContent = days[data.currentDayIndex];
            renderFoods();
            saveData();
        }

        // 添加奶茶
        function addMilktea() {
            data.milktea++;
            showFeedback('🧋');
            updateDisplay();
            saveData();
        }

        // 减少奶茶
        function removeMilktea() {
            if (data.milktea > 0) {
                data.milktea--;
                updateDisplay();
                saveData();
            }
        }

        // 添加噗噗
        function addPupu() {
            data.pupu++;
            showFeedback('💩');
            // 标记今天打卡
            data.weekCheck[data.currentDayIndex] = true;
            updateDisplay();
            renderWeekGrid();
            saveData();
        }

        // 添加喝水
        function addWater() {
            data.water++;
            showFeedback('💧');
            updateDisplay();
            saveData();
        }

        // 减少喝水
        function removeWater() {
            if (data.water > 0) {
                data.water--;
                updateDisplay();
                saveData();
            }
        }

        // 更新显示
        function updateDisplay() {
            document.getElementById('milkteaCount').textContent = data.milktea;
            document.getElementById('pupuCount').textContent = data.pupu;
            document.getElementById('waterCount').textContent = data.water;

            // 更新奶茶限额状态
            const milkteaBtn = document.querySelector('.milktea-btn');
            const milkteaCard = document.getElementById('milkteaCard');
            const milkteaMinus = document.getElementById('milkteaMinus');

            milkteaMinus.disabled = data.milktea <= 0;

            if (data.milktea >= MILKTEA_LIMIT) {
                milkteaBtn.classList.add('over-limit');
                milkteaBtn.textContent = '⚠️ 超限额';
                milkteaCard.classList.add('warning');
                setTimeout(() => milkteaCard.classList.remove('warning'), 500);
            } else {
                milkteaBtn.classList.remove('over-limit');
                milkteaBtn.textContent = '+ 喝一杯';
            }

            // 更新喝水按钮状态
            document.getElementById('waterMinus').disabled = data.water <= 0;
        }

        // 显示反馈动画
        function showFeedback(emoji) {
            const popup = document.createElement('div');
            popup.className = 'feedback-popup';
            popup.textContent = emoji;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        // 渲染周打卡
        function renderWeekGrid() {
            const weekDays = ['一', '二', '三', '四', '五', '六', '日'];
            const container = document.getElementById('weekGrid');

            container.innerHTML = weekDays.map((day, index) => `
                <div class="week-day ${data.weekCheck[index] ? 'completed' : ''}" onclick="toggleDay(${index})">
                    <div class="week-day-label">周${day}</div>
                    <div class="week-day-icon">${data.weekCheck[index] ? '✅' : '○'}</div>
                </div>
            `).join('');
        }

        // 切换打卡状态
        function toggleDay(index) {
            data.weekCheck[index] = !data.weekCheck[index];
            if (data.weekCheck[index]) {
                showFeedback('✅');
            }
            renderWeekGrid();
            saveData();
        }

        // 重置
        function resetWeek() {
            if (confirm('确定要重置本周所有数据吗？')) {
                data.milktea = 0;
                data.pupu = 0;
                data.water = 0;
                data.weekCheck = [false, false, false, false, false, false, false];
                updateDisplay();
                renderWeekGrid();
                saveData();
            }
        }

        // 保存到localStorage
        function saveData() {
            localStorage.setItem('healthTracker', JSON.stringify(data));
        }

        // 加载数据
        function loadData() {
            const saved = localStorage.getItem('healthTracker');
            if (saved) {
                data = JSON.parse(saved);
            }
            // 恢复目标选择状态
            document.querySelectorAll('.goal-option').forEach(o => {
                o.classList.toggle('selected', o.dataset.goal === data.currentGoal);
                o.querySelector('input').checked = o.dataset.goal === data.currentGoal;
            });
        }

        // 启动
        init();
    </script>
